name: debitum-monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # allow manual run

concurrency:
  group: debitum-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit seen.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser requests

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_ALERTS_RSS: ${{ secrets.GOOGLE_ALERTS_RSS }}
          YOUTUBE_CHANNELS: ${{ secrets.YOUTUBE_CHANNELS }}
        run: python monitor.py

      - name: Commit updated seen.json
        run: |
          git config user.name "debitum-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git add seen.json
            git commit -m "state: update seen.json [skip ci]"
            git push
          else
            echo "No state changes."
          fi
